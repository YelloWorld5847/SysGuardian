<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SysGuardian - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #ff6b35;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: #0a0a0a;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            padding: 40px;
            width: 380px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #ff6b35;
            border-radius: 5px;
            color: #ff6b35;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input:focus {
            outline: none;
            border-color: #ff8c5a;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        button {
            width: 100%;
            background: #ff6b35;
            color: #0a0a0a;
            border: none;
            border-radius: 5px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff8c5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }

        .error {
            background: #1a0000;
            border: 1px solid #ff0000;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #ff4444;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>SYSGUARDIAN</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>IDENTIFIANT</label>
            <input type="text" name="username" placeholder="Identifiant" autofocus>

            <label>MOT DE PASSE</label>
            <input type="password" name="password" placeholder="••••••••">

            <button type="submit">SE CONNECTER</button>
        </form>
    </div>
</body>
</html>
